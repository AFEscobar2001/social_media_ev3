services:
  jupyter:
    build: .
    ports:
      - "8888:8888"
    volumes:
      - .:/app
    environment:
      - PROJECT_ROOT=/app
      - DATA_DIR=/app/data
      - RAW_DATA_DIR=/app/data/raw
      - PROCESSED_DATA_DIR=/app/data/processed
    command: >
      jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root
      --NotebookApp.token= --LabApp.default_url=/lab/tree/Resumen.ipynb

  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - PROJECT_ROOT=/app
      - DATA_DIR=/app/data
      - RAW_DATA_DIR=/app/data/raw
      - PROCESSED_DATA_DIR=/app/data/processed
    command: >
      streamlit run dashboards/app.py --server.address=0.0.0.0 --server.port=8501
